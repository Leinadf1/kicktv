<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DEBUG DASHBOARD - TONY16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-container { width: 100%; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; }
        
        /* STILE DEBUG */
        #debug-box { 
            width: 100%; max-width: 800px; background: #161b22; border: 1px solid #f1e05a; 
            margin: 15px 0; padding: 10px; font-family: monospace; font-size: 11px; color: #f1e05a;
            white-space: pre-wrap; word-break: break-all; border-radius: 5px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; }
        .card:hover { border-color: #58a6ff; }
        .card img { max-height: 50px; margin-bottom: 8px; }
        .group-title { width: 100%; max-width: 1000px; color: #58a6ff; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="debug-box">DEBUG: In attesa di selezione canale...</div>

    <div id="list"></div>

<script>
const SOURCE = "lista.m3u";
const debugBox = document.getElementById('debug-box');

function logDebug(msg) {
    debugBox.innerText = "LOG: " + msg;
}

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');

    player.configure({ manifest: { dash: { ignoreDrmInfo: true } } });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossOrigin = true;
        if (request.uris[0].includes('pluscdn.pl')) {
            delete request.headers['Origin'];
            delete request.headers['Referer'];
            request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36';
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const m = line.match(/[a-f0-9]{32}/gi);
                if (m) ch.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};

                let grid = document.getElementById(currentCh.group);
                if (!grid) {
                    const title = document.createElement('div'); title.className = 'group-title'; title.innerText = currentCh.group;
                    listDiv.appendChild(title);
                    grid = document.createElement('div'); grid.className = 'grid'; grid.id = currentCh.group;
                    listDiv.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${currentCh.logo}"><div>${currentCh.name}</div>`;
                
                card.onclick = async () => {
                    // SCRIVI NEL DEBUG COSA STA SUCCEDENDO
                    const debugInfo = `CANALE: ${currentCh.name}\nURL: ${url}\nKEYS: ${JSON.stringify(currentCh.drm)}`;
                    logDebug(debugInfo);

                    try {
                        await player.unload();
                        player.configure({ drm: { clearKeys: currentCh.drm } });
                        
                        // Per i polacchi, prova a caricare l'URL così com'è
                        await player.load(url);
                    } catch(e) { 
                        logDebug(`ERRORE SHAKA: ${e.code}\nProvando fallback HTTPS...`);
                        try {
                            await player.load(url.replace('http://', 'https://'));
                        } catch(e2) {
                            logDebug(`FALLITO ANCHE HTTPS: ${e2.code}`);
                        }
                    }
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
    } catch(e) { logDebug("Errore caricamento lista M3U"); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
