<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test Eleven Sports 1</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">

<style>
body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
.container { width: 80%; max-width: 800px; text-align: center; }
video { width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
h2 { color: #f1e05a; }
</style>
</head>

<body>
<div class="container">
    <h2>Test Eleven Sports 1 (Polonia)</h2>
    <div data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>
</div>

<script>
// Dati estratti dai tuoi log precedenti
const stream = {
    manifest: 'https://cdn-s-lb2.pluscdn.pl/ch/1457734/144/dash/0be7047a/live.mpd',
    clearKeys: {
        "2cd12eaca5c14b30a3280b1a89484809": "e2c14f6cc245c1a5ebbc8c8c704fc6c7"
    }
};

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();

    player.addEventListener('error', e => console.error('Player error:', e.detail));

    // Configurazione DRM e Filtri per tentare il bypass dell'Origin
    player.configure({
        drm: { clearKeys: stream.clearKeys },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    // Filtro per pulire gli header (il tentativo che facevamo prima)
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        // Forziamo HTTPS perché su domini cloud è obbligatorio
        await player.load(stream.manifest.replace('http://', 'https://'));
        console.log('Stream caricato!');
    } catch (e) {
        console.error('Errore caricamento:', e);
    }
}

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
