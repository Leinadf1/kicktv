<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD TONY16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-container { width: 100%; max-width: 800px; background: #000; margin-bottom: 30px; border: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; }
        .category-title { color: #f1e05a; font-size: 18px; font-weight: bold; margin: 20px 0 10px; border-left: 5px solid #58a6ff; padding-left: 10px; width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; }
        .card:hover { border-color: #58a6ff; }
        .card img { max-width: 100%; height: 50px; object-fit: contain; }
        #status { color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2 style="color:#58a6ff">TONY16 DASHBOARD</h2>
    <div id="status">Caricamento lista...</div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="list" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>

<script>
// NOME DEL FILE CORRETTO COME DA TUO GITHUB
const M3U_URL = "lista.m3u"; 

async function start() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');

    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    try {
        const response = await fetch(M3U_URL);
        const data = await response.text();
        const lines = data.split('\n');

        let current = { name: "", logo: "", group: "ALTRI", drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                let keyVal = line.split('=')[1];
                if (keyVal.startsWith('{')) {
                    try { current.drm = JSON.parse(keyVal); } catch(e) {}
                } else if (keyVal.includes(':')) {
                    let parts = keyVal.split(':');
                    if(parts.length === 2) current.drm[parts[0].trim()] = parts[1].trim();
                }
            } else if (line.startsWith('#EXTINF:')) {
                current.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                current.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                current.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const ch = {...current};
                const url = line;

                let groupGrid = document.getElementById('g-' + ch.group);
                if (!groupGrid) {
                    const title = document.createElement('div');
                    title.className = 'category-title';
                    title.innerText = ch.group;
                    listDiv.appendChild(title);
                    groupGrid = document.createElement('div');
                    groupGrid.className = 'grid';
                    groupGrid.id = 'g-' + ch.group;
                    listDiv.appendChild(groupGrid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${ch.logo}"><div style="font-size:11px; margin-top:5px;">${ch.name}</div>`;
                card.onclick = () => {
                    player.configure({ drm: { clearKeys: ch.drm } });
                    player.load(url).catch(e => console.error("Errore caricamento:", e.code));
                    window.scrollTo(0,0);
                };

                groupGrid.appendChild(card);
                count++;
                current = { name: "", logo: "", group: "ALTRI", drm: {} };
            }
        }
        document.getElementById('status').innerText = count + " CANALI CARICATI";
    } catch (err) {
        document.getElementById('status').innerText = "ERRORE: File lista.m3u non trovato";
    }
}

document.addEventListener('shaka-ui-loaded', start);
</script>
</body>
</html>
