<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>KICK TV</title>

    <!-- ICONA DELLA PAGINA (FAVICON) -->
    <link rel="icon" type="image/png" href="https://leinadf1.github.io/tony/image.png">
    <link rel="apple-touch-icon" href="https://leinadf1.github.io/tony/image.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* RESET GENERALE & SFONDO NERO ASSOLUTO */
        body { 
            background-color: #000000; 
            color: #f0f6fc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-font-smoothing: antialiased; 
        }

        /* HEADER: CONTEGGIO CANALI VERDE NEON */
        #header { 
            width: 100%; 
            max-width: 1200px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid #1f2328; 
            padding-bottom: 15px; 
            box-sizing: border-box; 
        }
        h1 { 
            font-size: 24px; 
            font-weight: 800; 
            color: #ffffff; 
            margin: 0; 
            letter-spacing: -1px; 
        }
        #chan-count { 
            font-size: 12px; 
            color: #05ff12; 
            font-weight: 700; 
            background: rgba(5, 255, 18, 0.1); 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid #05ff12;
            text-transform: uppercase;
        }

        /* PLAYER CONTAINER: LOOK PREMIUM */
        .player-container { 
            width: 100%; 
            max-width: 900px; 
            background: #000; 
            margin-bottom: 50px; 
            z-index: 10; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 15px rgba(5, 255, 18, 0.1);
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        /* CATEGORY CONTAINER */
        .category-container { width: 100%; max-width: 1200px; margin-bottom: 50px; box-sizing: border-box; }
        .category-title { 
            font-size: 18px; 
            color: #05ff12; 
            margin-bottom: 25px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            display: flex; 
            align-items: center; 
        }
        .category-title::before { 
            content: ""; 
            display: inline-block; 
            width: 4px; 
            height: 20px; 
            background: #05ff12; 
            margin-right: 12px; 
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(5, 255, 18, 0.8);
        }

        /* GRID CANALI */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            width: 100%; 
        }

        /* CHANNEL CARD: EFFETTO NEON HOVER */
        .channel-card { 
            background-color: #0d0d0d; 
            border: 1px solid #1f2328; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        .channel-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: #05ff12; 
            background-color: #141414; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px rgba(5, 255, 18, 0.3);
        }
        .channel-card.active { 
            border: 2px solid #05ff12; 
            background-color: #141414; 
            box-shadow: 0 0 25px rgba(5, 255, 18, 0.5);
        }

        /* LOGO BOX */
        .logo-box { 
            width: 100%; 
            height: 110px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000000; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }

        /* INFO BOX */
        .info-box { 
            padding: 15px; 
            text-align: center; 
            border-top: 1px solid #1f2328; 
            background: #0d0d0d; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .name { 
            font-size: 13px; 
            font-weight: 700; 
            color: #ffffff; 
            text-transform: uppercase; 
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .logo-box { height: 90px; padding: 15px; }
            .name { font-size: 11px; }
            body { padding: 15px 10px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>KICK TV</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script>
const SOURCE_API = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ 
        manifest: { dash: { ignoreDrmInfo: true } }, 
        streaming: { 
            jumpLargeGaps: true,
            retryParameters: { maxAttempts: 3 }
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            request.headers['User-Agent'] = 'Mozilla/5.0 (Web0S; Linux/SmartTV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.5735.199 Safari/537.36';
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE_API);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                let gridId = `grid-${currentCh.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group.toUpperCase()}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}" onerror="this.src='https://via.placeholder.com/150x80?text=TV'"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = async () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    await player.unload();
                    
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    
                    try {
                        const finalUrl = url.startsWith('http://') ? url.replace('http://', 'https://') : url;
                        await player.load(finalUrl);
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    } catch (e) {
                        console.error("Errore Shaka:", e);
                    }
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) { console.error("Errore API:", e); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
