<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD TONY16 - MULTI-FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; }
        #chan-count { font-size: 13px; color: #8b949e; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; border-radius: 8px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; transition: 0.25s; }
        .card:hover { border-color: #58a6ff; transform: translateY(-3px); }
        .card img { max-width: 100%; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .group-title { color: #f1e05a; font-size: 15px; font-weight: bold; margin: 25px 0 10px; width: 100%; max-width: 1100px; border-left: 4px solid #58a6ff; padding-left: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <h1>DASHBOARD TONY16</h1>
        <div id="chan-count">Caricamento...</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script>
const SOURCE = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');

    // Configurazione specifica per flussi ostici
    player.configure({
        manifest: { dash: { ignoreDrmInfo: true } },
        streaming: {
            jumpLargeGaps: true,
            dispatchAllEmsgBoxes: true
        }
    });

    // IL FILTRO DEFINITIVO
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossOrigin = true;

        // Se il canale è polacco, dobbiamo essere "aggressivi"
        if (request.uris[0].includes('pluscdn.pl')) {
            // Rimuoviamo le tracce di GitHub
            delete request.headers['Origin'];
            delete request.headers['Referer'];
            
            // Usiamo uno User-Agent che i server Polacchi amano (Chromecast o Player standard)
            request.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 10; Chromecast) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36';
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const m = line.match(/[a-f0-9]{32}/gi);
                if (m) ch.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};

                let grid = document.getElementById(currentCh.group);
                if (!grid) {
                    const title = document.createElement('div'); title.className = 'group-title'; title.innerText = currentCh.group;
                    listDiv.appendChild(title);
                    grid = document.createElement('div'); grid.className = 'grid'; grid.id = currentCh.group;
                    listDiv.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${currentCh.logo}"><div>${currentCh.name}</div>`;
                
                card.onclick = async () => {
                    try {
                        await player.unload();
                        // Applichiamo le chiavi DRM
                        player.configure({ drm: { clearKeys: currentCh.drm } });
                        
                        // Per i polacchi, usiamo l'URL HTTP originale (senza S) 
                        // MA assicurati di aver sbloccato il lucchetto del browser!
                        await player.load(url);
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    } catch(e) { 
                        console.error("Errore caricamento:", e.code);
                        // Se fallisce, prova un ultimo tentativo forzando HTTPS
                        if (url.startsWith('http://')) {
                            await player.load(url.replace('http://', 'https://'));
                        }
                    }
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
    } catch(e) { console.error("Errore lista:", e); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
