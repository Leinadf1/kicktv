<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>KICK TV</title>

    <!-- ICONE -->
    <link rel="icon" type="image/png" sizes="512x512" href="https://leinadf1.github.io/kicktv/image.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="https://leinadf1.github.io/kicktv/image.png?v=2">
    <link rel="icon" type="image/png" href="https://leinadf1.github.io/kicktv/image.png?v=2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center; padding: 20px;
        }
        #splash-screen.fade-out { opacity: 0; visibility: hidden; }
        .splash-logo { width: 120px; height: 120px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { font-size: 32px; font-weight: 800; color: #05ff12; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px #05ff12); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px #05ff12); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px #05ff12); }
        }

        /* STILI BASE DESKTOP */
        body { 
            background-color: #000; color: #f0f6fc; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        #header { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; border-bottom: 1px solid #1f2328; padding-bottom: 15px; 
        }
        h1 { font-size: 22px; color: #05ff12; text-transform: uppercase; margin: 0; }
        #chan-count { font-size: 13px; color: #05ff12; background: #161b22; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(5,255,18,0.3); }
        
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 30px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .category-container { width: 100%; margin-bottom: 40px; }
        .category-title { 
            font-size: 16px; color: #05ff12; margin-bottom: 15px; font-weight: 700; 
            text-transform: uppercase; display: flex; align-items: center;
        }
        .category-title::before { content: ""; width: 4px; height: 18px; background: #05ff12; margin-right: 10px; border-radius: 2px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; width: 100%;
        }
        
        .channel-card { 
            background-color: #0d1117; border: 1px solid #30363d; border-radius: 12px; 
            overflow: hidden; display: flex; flex-direction: column; cursor: pointer;
        }
        .channel-card.active { border: 2px solid #05ff12; background-color: #161b22; }
        .logo-box { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 10px; text-align: center; border-top: 1px solid #30363d; background: #0d1117; }
        .name { font-size: 13px; font-weight: 600; text-transform: uppercase; }

        /* MODIFICA MOBILE: COPIATA DA FOTO 2 */
        @media (max-width: 600px) {
            body { padding: 10px !important; }
            #header { margin-bottom: 15px; }
            .grid { 
                grid-template-columns: repeat(2, 1fr) !important; /* FORZA 2 COLONNE */
                gap: 12px !important; 
            }
            .logo-box { height: 85px !important; padding: 12px !important; }
            .name { font-size: 11px !important; }
            .category-container { margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://leinadf1.github.io/kicktv/image.png" class="splash-logo">
        <div class="splash-title">Kick Streaming</div>
    </div>

    <div id="header">
        <h1>KICK TV🔥📺</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script>
// Splash screen
window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('splash-screen').classList.add('fade-out'); }, 2500);
});

const SOURCE_API = "lista.m3u";
const FALLBACK = 'https://via.placeholder.com/150x80?text=TV';

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');

    player.configure({ streaming: { jumpLargeGaps: true } });

    try {
        const res = await fetch(SOURCE_API);
        const text = await res.text();
        const lines = text.split('\n');
        
        let currentCh = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                try {
                    const keyData = line.split('license_key=')[1];
                    currentCh.drm = keyData.includes('{') ? JSON.parse(keyData) : {};
                } catch(e) {}
            } else if (line.startsWith('#EXTINF:')) {
                currentCh.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                currentCh.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                currentCh.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const streamUrl = line;
                const ch = {...currentCh};
                count++;

                let gridId = `grid-${ch.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${ch.group}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${ch.logo}" onerror="this.src='${FALLBACK}'"></div>
                    <div class="info-box"><div class="name">${ch.name}</div></div>
                `;
                
                card.onclick = async () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    await player.unload();
                    player.configure({ drm: { clearKeys: ch.drm } });
                    await player.load(streamUrl);
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                currentCh = { drm: {} };
            }
        }
        document.getElementById('chan-count').innerText = count + " CANALI";
    } catch(e) { console.error(e); }
}

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
