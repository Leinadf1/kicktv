<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD TONY16 - MULTI-FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; }
        #chan-count { font-size: 13px; color: #8b949e; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; border-radius: 8px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; transition: 0.25s; }
        .card:hover { border-color: #58a6ff; transform: translateY(-3px); }
        .card img { max-width: 100%; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .group-title { color: #f1e05a; font-size: 15px; font-weight: bold; margin: 25px 0 10px; width: 100%; max-width: 1100px; border-left: 4px solid #58a6ff; padding-left: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <h1>DASHBOARD TONY16</h1>
        <div id="chan-count">Caricamento...</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script>
const SOURCE_URL = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');

    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // PER IL PORTOGALLO: Forza HTTPS
        if (request.uris[0].includes('vodafone.pt') && request.uris[0].startsWith('http://')) {
            request.uris[0] = request.uris[0].replace('http://', 'https://');
        }
        
        // PER LA POLONIA: Usa un proxy per evitare blocchi HTTPS/CORS
        if (request.uris[0].includes('pluscdn.pl')) {
            // Se non va con https, lo facciamo passare da AllOrigins
            if (!request.uris[0].includes('api.allorigins.win')) {
                const originalUrl = request.uris[0];
                request.uris[0] = `https://api.allorigins.win/raw?url=${encodeURIComponent(originalUrl)}`;
            }
        }
    });

    try {
        const response = await fetch(SOURCE_URL);
        const text = await response.text();
        const lines = text.split('\n');
        let current = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const val = line.split('=')[1];
                const m = val.match(/[a-f0-9]{32}/gi);
                if (m && m.length >= 2) current.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                current.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                current.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                current.name = (line.match(/,(.*)/) || [])[1] || "Unknown";
            } else if (line.startsWith('http')) {
                current.url = line;
                const ch = {...current};
                
                let grid = document.getElementById('g-' + ch.group);
                if (!grid) {
                    const t = document.createElement('div'); t.className = 'group-title'; t.innerText = ch.group;
                    mainList.appendChild(t);
                    grid = document.createElement('div'); grid.className = 'grid'; grid.id = 'g-' + ch.group;
                    mainList.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${ch.logo}"><div style="font-size:11px;">${ch.name}</div>`;
                card.onclick = async () => {
                    try {
                        await player.unload();
                        player.configure({ drm: { clearKeys: ch.drm } });
                        // Se è polacco, mandiamo subito l'URL al proxy
                        let targetUrl = ch.url;
                        if (targetUrl.includes('pluscdn.pl')) {
                            targetUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                        } else if (targetUrl.includes('vodafone.pt')) {
                            targetUrl = targetUrl.replace('http://', 'https://');
                        }
                        await player.load(targetUrl);
                        window.scrollTo(0,0);
                    } catch(e) { console.error("Errore:", e.code); }
                };
                grid.appendChild(card);
                count++;
                current = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
            }
        }
        document.getElementById('chan-count').innerText = count + " CANALI";
    } catch(e) { console.error("Errore!"); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
