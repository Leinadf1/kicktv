<script type="module">

  appId: "1:838586759420:web:ca320ac5818daa87d00f79"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function checkAccess() {
    const passwordInserita = prompt("Inserisci la Password per accedere:");
    if (!passwordInserita) return window.location.reload();

    try {
        const pwdSnapshot = await get(ref(db, 'passwords'));
        const pwdData = pwdSnapshot.val();
        let pwdKey = null;

        if (pwdData) {
            for (let key in pwdData) {
                if (pwdData[key] === passwordInserita) { pwdKey = key; break; }
            }
        }

        if (!pwdKey) {
            alert("Password errata!");
            window.location.reload();
            return;
        }

        const userLockRef = ref(db, `session/${pwdKey}`);
        const snapshot = await get(userLockRef);
        const session = snapshot.val();
        const ora = Date.now();

        if (session && session.occupied && (ora - session.lastSeen < 40000)) {
            alert("Questa password è già in uso su un altro dispositivo!");
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:100px;'>SESSIONE OCCUPATA</h2>";
            document.body.style.display = "block";
            return;
        }

        await set(userLockRef, { occupied: true, lastSeen: ora });
        setInterval(() => { set(userLockRef, { occupied: true, lastSeen: Date.now() }); }, 20000);
        onDisconnect(userLockRef).set({ occupied: false, lastSeen: Date.now() });

        // Se tutto ok, mostriamo il body e avviamo la tua funzione init()
        document.getElementById('mainBody').style.display = "flex";
        init();

    } catch (error) {
        console.error(error);
        alert("Errore di connessione al database.");
    }
}

// --- LA TUA LOGICA ORIGINALE (NON MODIFICATA) ---

const CANALI_FISSI = [

    { name: "EUROSPORT 1", logo: "https://thumb.prod.front.tim.cptech.pro/http/unsafe/120x90/img-cdn.prod.catalog.tim.cptech.pro/p1/channel/90020000/tim-ouah/CHN43FN/MONOGRAM_ESP1_WHITE_V2-Lv2g", url: "https://timlivetu0.cb.ticdn.it/Content/DASH/Live/channel(eurosport1)/manifest.mpd", drm: {"46e559c2f9f645ce8d80c7fa20446bdb":"597d214d66342ee042bccffeb165e750"} },

    { name: "EUROSPORT 4", logo: "https://thumb.prod.front.tim.cptech.pro/http/unsafe/120x90/img-cdn.prod.catalog.tim.cptech.pro/p1/channel/90020003/tim-ouah/CHN43FN/MONOGRAM_ESP360_WHITE_V4-3YSY", url: "https://timlivetu0.cb.ticdn.it/Content/DASH/Live/channel(eurosport4)/manifest.mpd", drm: {"9dd7be79e44f4d08a91ec5d1553f17b8":"8a62369f81a4b6e5f2d4846f7bd5e7d1"} },

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const countHeader = document.getElementById('chan-count');

    player.configure({ streaming: { jumpLargeGaps: true } });

    function getCategoryGrid(groupName) {
        const name = (groupName || "ALTRI").toUpperCase().trim();
        let gridId = `grid-${name.replace(/[^a-z0-9]/gi, '-')}`;
        let grid = document.getElementById(gridId);
        
        if (!grid) {
            const container = document.createElement('div');
            container.className = 'category-container';
            container.innerHTML = `<div class="category-title">${name}</div><div class="grid" id="${gridId}"></div>`;
            mainList.appendChild(container);
            grid = document.getElementById(gridId);
        }
        return grid;
    }

    function createCard(ch) {
        const grid = getCategoryGrid(ch.group);
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150x80/21262d/8b949e?text=${encodeURIComponent(ch.name)}'"></div>
            <div class="info-box"><div class="name">${ch.name}</div></div>
        `;
        
        card.onclick = async () => {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            try {
                await player.unload();
                player.configure({ drm: { clearKeys: (ch.drm && Object.keys(ch.drm).length > 0) ? ch.drm : {} } });
                await player.load(ch.url);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch(e) { console.error("Errore Shaka:", e.code); }
        };
        grid.appendChild(card);
    }

    try {
        const response = await fetch(SOURCE_URL + "?t=" + Date.now());
        const text = await response.text();
        const lines = text.split('\n');

        let currentChannel = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
        let loadedCount = 0;

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                const keyData = line.split('=')[1];
                if (keyData.startsWith('{')) {
                    try { currentChannel.drm = JSON.parse(keyData); } catch(e) {}
                } else {
                    const parts = keyData.split(':');
                    if (parts.length === 2) currentChannel.drm[parts[0].toLowerCase()] = parts[1].toLowerCase();
                }
            } 
            else if (line.startsWith('#EXTINF:')) {
                const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                const groupMatch = line.match(/group-title="([^"]+)"/i);
                const nameMatch = line.match(/,(.*)/);
                
                if (logoMatch) currentChannel.logo = logoMatch[1];
                if (groupMatch) currentChannel.group = groupMatch[1];
                if (nameMatch) currentChannel.name = nameMatch[1].trim();
            } 
            else if (line.startsWith('http')) {
                currentChannel.url = line;
                createCard(currentChannel);
                loadedCount++;
                currentChannel = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
            }
        }

        CANALI_FISSI.forEach(ch => {
            createCard({ ...ch, group: "EUROSPORT" });
        });

        countHeader.innerText = (loadedCount + CANALI_FISSI.length) + " CANALI";

    } catch(e) { console.error("Errore lista:", e); }
}

// Avvio tramite Shaka UI
