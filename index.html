<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony16 Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: #white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-container { width: 100%; max-width: 800px; background: #000; margin-bottom: 30px; border: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; }
        .category { width: 100%; max-width: 1000px; margin-bottom: 30px; }
        .category-title { color: #f1e05a; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid #58a6ff; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .card:hover { border-color: #58a6ff; transform: scale(1.03); }
        .card img { max-width: 100%; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .card div { font-size: 12px; font-weight: bold; color: #c9d1d9; text-transform: uppercase; }
        #status { color: #8b949e; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h2 style="color:#58a6ff">TONY16 TV</h2>
    <div id="status">Caricamento in corso...</div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="list" style="width:100%"></div>

<script>
// IL NOME DEL FILE DEVE ESSERE ESATTAMENTE QUESTO
const M3U_FILE = "lista Tony.m3u"; 

async function start() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');

    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    try {
        const response = await fetch(M3U_FILE);
        const data = await response.text();
        const lines = data.split('\n');

        let ch = { name: "", logo: "", group: "ALTRI", drm: {} };
        let count = 0;

        lines.forEach(line => {
            line = line.trim();
            if (line.includes('#KODIPROP:inputstream.adaptive.license_key=')) {
                let key = line.split('=')[1];
                if (key.startsWith('{')) {
                    try { ch.drm = JSON.parse(key); } catch(e) {}
                } else if (key.includes(':')) {
                    let p = key.split(':');
                    ch.drm[p[0].trim()] = p[1].trim();
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const finalCh = {...ch};
                const finalUrl = line;

                // Trova o crea la griglia della categoria
                let groupDiv = document.getElementById('group-' + finalCh.group);
                if (!groupDiv) {
                    const section = document.createElement('div');
                    section.className = 'category';
                    section.innerHTML = `<div class="category-title">${finalCh.group}</div><div class="grid" id="group-${finalCh.group}"></div>`;
                    listDiv.appendChild(section);
                    groupDiv = document.getElementById('group-' + finalCh.group);
                }

                // Crea la card
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${finalCh.logo}"><div>${finalCh.name}</div>`;
                card.onclick = () => {
                    player.configure({ drm: { clearKeys: finalCh.drm } });
                    player.load(finalUrl);
                    window.scrollTo(0,0);
                };

                groupDiv.appendChild(card);
                count++;
                ch = { name: "", logo: "", group: "ALTRI", drm: {} };
            }
        });

        document.getElementById('status').innerText = count + " Canali caricati con successo";

    } catch (err) {
        document.getElementById('status').innerText = "Errore nel caricamento del file M3U";
    }
}

document.addEventListener('shaka-ui-loaded', start);
</script>
</body>
</html>
